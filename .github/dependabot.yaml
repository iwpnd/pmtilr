version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    commit-message:
      prefix: "chore(deps): "
    groups:
      aws:
        patterns:
          - "github.com/aws/aws-sdk-go-v2"
          - "github.com/aws/aws-sdk-go-v2/*"
    schedule:
      interval: monthly
  - package-ecosystem: github-actions
    directory: /
    commit-message:
      prefix: "ci(gha): "
    schedule:
      interval: monthly
